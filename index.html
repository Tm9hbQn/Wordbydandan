<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>המילים הראשונות של דניאלה ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Varela+Round&family=Karantina:wght@300;400;700&family=Suez+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
</head>
<body>
  <!-- Floating background elements -->
  <div class="floating-elements" aria-hidden="true">
    <span class="float-el" style="--delay: 0s; --duration: 6s; --x: 10%;">⭐</span>
    <span class="float-el" style="--delay: 1s; --duration: 8s; --x: 25%;">🌙</span>
    <span class="float-el" style="--delay: 2s; --duration: 7s; --x: 45%;">💫</span>
    <span class="float-el" style="--delay: 0.5s; --duration: 9s; --x: 65%;">🧸</span>
    <span class="float-el" style="--delay: 3s; --duration: 6.5s; --x: 80%;">🎀</span>
    <span class="float-el" style="--delay: 1.5s; --duration: 7.5s; --x: 90%;">🍼</span>
    <span class="float-el" style="--delay: 2.5s; --duration: 8.5s; --x: 5%;">🌈</span>
    <span class="float-el" style="--delay: 4s; --duration: 6s; --x: 55%;">☁️</span>
    <span class="float-el" style="--delay: 3.5s; --duration: 7s; --x: 35%;">🦋</span>
    <span class="float-el" style="--delay: 0.8s; --duration: 9.5s; --x: 75%;">✨</span>
  </div>

  <!-- Header -->
  <header class="main-header">
    <div class="header-content">
      <div class="baby-scene">
        <div class="baby-character">
          <div class="baby-body">👶</div>
        </div>
        <div class="baby-blocks">
          <span class="block block-a">א</span>
          <span class="block block-b">ב</span>
          <span class="block block-c">ג</span>
        </div>
      </div>
      <h1 class="site-title">המילים הראשונות של דניאלה</h1>
    </div>
  </header>

  <!-- Word Input Section -->
  <section class="input-section" id="inputSection">
    <div class="input-container">
      <div class="marker-area">
        <div class="marker-line">
          <div class="marker-dot"></div>
          <input
            class="marker-input"
            id="wordInput"
            type="text"
            placeholder="כתבו מילה חדשה..."
            aria-label="הוסיפו מילה חדשה"
            autocomplete="off"
          >
        </div>
        <div class="marker-underline"></div>
        <button class="add-btn" id="addBtn" aria-label="הוסיפו מילה">
          <span class="add-btn-icon">+</span>
          <span class="add-btn-text">הוסיפו ✨</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Age Picker Section -->
  <section class="age-section hidden" id="ageSection">
    <div class="age-container">
      <h2 class="age-question" id="ageQuestion"></h2>
      <div class="age-wheel-wrapper">
        <div class="age-wheel-highlight"></div>
        <div class="age-wheel" id="ageOptions"></div>
      </div>
      <button class="age-confirm-btn" id="ageConfirmBtn">בחרו 👆</button>
      <button class="just-now-btn" id="justNowBtn" style="display:none;">עכשיו! 🎉</button>
    </div>
  </section>

  <!-- Notes Section -->
  <section class="notes-section hidden" id="notesSection">
    <div class="notes-container">
      <h2 class="notes-title" id="notesTitle"></h2>
      <div
        class="notes-input"
        id="notesInput"
        contenteditable="true"
        data-placeholder="הוסיפו הקשר או סיפור..."
        role="textbox"
        aria-label="הערות"
      ></div>
      <div class="notes-actions">
        <button class="notes-skip-btn" id="notesSkipBtn">דלגו</button>
        <button class="notes-save-btn" id="notesSaveBtn">שמרו 💕</button>
      </div>
    </div>
  </section>

  <!-- Success Toast -->
  <div class="success-toast hidden" id="successOverlay">
    <span class="success-emoji">🎉</span>
    <span class="success-text" id="successText"></span>
  </div>

  <!-- Words List Section -->
  <section class="words-section" id="wordsSection">
    <h2 class="words-title">המילים של דניאלה 💬</h2>
    <div class="words-counter">
      <span id="wordCount">0</span> מילים עד עכשיו
    </div>
    <div class="view-toggle">
      <button class="view-toggle-btn" id="gridViewBtn" aria-label="תצוגת רשת">
        <span>▦</span> רשת
      </button>
      <button class="view-toggle-btn active" id="timelineViewBtn" aria-label="תצוגת ציר זמן">
        <span>━</span> ציר זמן
      </button>
    </div>
    <div class="search-container" id="searchSection">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="חפשו מילה..."
        aria-label="חיפוש מילים"
        autocomplete="off"
      >
      <button class="search-clear hidden" id="searchClear" aria-label="נקו חיפוש">✕</button>
    </div>
    <div class="words-grid hidden" id="wordsGrid">
      <!-- Words populated by JS -->
    </div>
    <!-- Timeline View -->
    <div class="timeline-wrapper" id="timelineWrapper">
      <div class="timeline-age-overlay" id="timelineAgeOverlay">
        <div class="timeline-age-text" id="timelineAgeText"></div>
      </div>
      <div class="timeline-scroll" id="timelineScroll">
        <div class="timeline-track" id="timelineTrack">
          <!-- Timeline items populated by JS -->
        </div>
      </div>
      <div class="timeline-center-indicator"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🌱</div>
      <p>עוד לא הוספנו מילים...</p>
      <p class="empty-sub">המילה הראשונה מחכה למעלה ☝️</p>
    </div>
  </section>

  <!-- Word Modal (View + Edit) -->
  <div class="modal-overlay hidden" id="editModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="סגירה">✕</button>

      <!-- View Mode -->
      <div id="wordViewMode">
        <div class="view-word-display" id="viewWordDisplay"></div>
        <div class="view-age-display" id="viewAgeDisplay"></div>
        <div class="view-notes-display hidden" id="viewNotesDisplay"></div>
        <div class="view-evo-section hidden" id="viewEvoSection">
          <div class="view-evo-label">התפתחות מילה 🔗</div>
          <div class="view-evo-chain" id="viewEvoChain"></div>
        </div>
        <div class="modal-actions">
          <button class="modal-delete-btn" id="editDeleteBtn">מחקו 🗑️</button>
          <button class="modal-edit-btn" id="editToggleBtn">ערכו ✏️</button>
        </div>
      </div>

      <!-- Edit Mode -->
      <div id="wordEditMode" class="hidden">
        <h3 class="modal-title">עריכת מילה</h3>
        <div class="modal-field">
          <label>מילה</label>
          <div class="modal-input" id="editWordInput" contenteditable="true" role="textbox"></div>
        </div>
        <div class="modal-field">
          <label>גיל</label>
          <div class="modal-age-picker" id="editAgePicker"></div>
        </div>
        <div class="modal-field">
          <label>הערות</label>
          <div class="modal-input modal-notes" id="editNotesInput" contenteditable="true" role="textbox" data-placeholder="הוסיפו הקשר..."></div>
        </div>
        <div class="modal-field">
          <label>התפתחות מילה 🔗</label>
          <div class="link-section" id="linkSection">
            <div class="link-current hidden" id="linkCurrent">
              <span class="link-badge" id="linkBadge"></span>
              <button class="link-remove-btn" id="linkRemoveBtn" aria-label="הסירו קישור">✕</button>
            </div>
            <div class="link-search-wrap" id="linkSearchWrap">
              <input
                class="link-search-input"
                id="linkSearchInput"
                type="text"
                placeholder="חפשו מילה לקשר..."
                autocomplete="off"
              >
              <div class="link-results hidden" id="linkResults"></div>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" id="editCancelBtn">ביטול</button>
          <button class="modal-save-btn" id="editSaveBtn">שמרו 💕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Evolution Chain Modal -->
  <div class="modal-overlay hidden" id="evoModal">
    <div class="modal-content evo-modal-content">
      <button class="modal-close" id="evoModalClose" aria-label="סגירה">✕</button>
      <h3 class="modal-title">התפתחות מילה 🌱➡️🌳</h3>
      <div class="evo-chain" id="evoChain">
        <!-- Chain items populated by JS -->
      </div>
      <div class="evo-actions">
        <button class="evo-done-btn" id="evoDoneBtn">סגירה</button>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <p>כל הזכויות על המילים שמורות לדן-דן® 05.12.2024 - חיה בועטת</p>
    <button id="exportBtn" style="margin-top:0.8rem;background:#F3E5F5;color:#2D1B69;border:none;border-radius:50px;padding:0.5rem 1.5rem;font-family:'Varela Round',sans-serif;font-size:0.85rem;cursor:pointer;">ייצוא מילים 📋</button>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
