name: Build Widget APK

on:
  push:
    branches: [main]
    paths:
      - 'android-widget/**'
      - '.github/workflows/build-widget.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME

      - name: Generate Gradle wrapper
        working-directory: android-widget
        run: |
          gradle wrapper --gradle-version=8.5
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android-widget
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv android-widget/app/build/outputs/apk/debug/app-debug.apk \
             android-widget/app/build/outputs/apk/debug/dandan-widget.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dandan-widget
          path: android-widget/app/build/outputs/apk/debug/dandan-widget.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-v${{ github.run_number }}
          name: "וויג׳ט דנדן v${{ github.run_number }}"
          body: |
            קובץ התקנה של הוויג׳ט להוספת מילים מהירה ממסך הבית.

            הורידו את הקובץ dandan-widget.apk, פתחו אותו בטלפון, והתקינו.
            אם מופיעה אזהרה על התקנה ממקור לא ידוע - אשרו.
          files: android-widget/app/build/outputs/apk/debug/dandan-widget.apk
